<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>密碼檢查小助手</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @keyframes bounce-slow {
            0%, 100% { transform: translateY(-5%); }
            50% { transform: translateY(5%); }
        }
        .animate-bounce-slow {
            animation: bounce-slow 3s ease-in-out infinite;
        }
        /* 自訂字體與一些基本設定 */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
    </style>
</head>
<body class="min-h-screen bg-sky-100 flex items-center justify-center p-4 text-gray-800">

    <div class="bg-white rounded-[2.5rem] shadow-xl p-6 md:p-8 w-full max-w-lg border-8 border-sky-200 relative overflow-hidden">
        
        <!-- 背景裝飾 (Sparkles icon) -->
        <div class="absolute top-[-20px] right-[-20px] text-yellow-200 opacity-50">
            <i data-lucide="sparkles" style="width: 120px; height: 120px;"></i>
        </div>

        <!-- 標題區 -->
        <div class="flex items-center justify-center space-x-3 mb-8 relative z-10">
            <i data-lucide="shield-check" class="text-sky-500 w-10 h-10"></i>
            <h1 class="text-2xl md:text-3xl font-bold text-sky-600 tracking-wide">
                密碼檢查小助手
            </h1>
        </div>

        <!-- 機器人與對話泡泡區 -->
        <div class="flex flex-col md:flex-row items-start space-y-4 md:space-y-0 md:space-x-4 mb-8 relative z-10">
            <!-- 機器人頭像 -->
            <div class="flex-shrink-0 bg-yellow-300 rounded-full p-3 border-4 border-yellow-400 mx-auto md:mx-0 shadow-sm animate-bounce-slow">
                <i data-lucide="bot" class="w-12 h-12 text-yellow-800"></i>
            </div>
            
            <!-- 對話泡泡 -->
            <div id="messageBubble" class="relative p-5 rounded-2xl md:rounded-tl-none shadow-md transition-colors duration-300 bg-blue-50 border-2 border-blue-200">
                <!-- 泡泡的小尾巴 (Desktop) -->
                <div id="bubbleTailOuter" class="hidden md:block absolute top-0 left-[-12px] w-0 h-0 border-t-[15px] border-t-transparent border-r-[15px] border-b-[15px] border-b-transparent border-r-blue-200"></div>
                <div id="bubbleTailInner" class="hidden md:block absolute top-[2px] left-[-8px] w-0 h-0 border-t-[13px] border-t-transparent border-r-[13px] border-b-[13px] border-b-transparent border-r-blue-50"></div>
                
                <p id="messageText" class="text-lg md:text-xl font-medium leading-relaxed text-gray-700">
                    嗨！小朋友你好，我是老師的小助手。密碼設定的規則是：必須有『英文字母』加上『數字』，而且長度要至少 8 個字喔！請在下面輸入你想測試的密碼吧！
                </p>
            </div>
        </div>

        <!-- 輸入區 -->
        <div class="space-y-6 relative z-10">
            <div class="relative">
                <input
                    type="password"
                    id="passwordInput"
                    placeholder="請在這裡輸入密碼..."
                    class="w-full text-xl md:text-2xl p-4 md:p-5 pr-14 rounded-2xl border-4 border-sky-100 bg-sky-50 focus:border-sky-400 focus:bg-white focus:outline-none transition-all shadow-inner tracking-wider"
                />
                
                <!-- 顯示/隱藏密碼按鈕 -->
                <button
                    id="togglePasswordBtn"
                    class="absolute right-4 top-1/2 transform -translate-y-1/2 text-sky-400 hover:text-sky-600 transition-colors p-2 bg-white rounded-full shadow-sm"
                    title="顯示密碼"
                >
                    <i data-lucide="eye" id="eyeIcon" class="w-7 h-7"></i>
                </button>
            </div>

            <!-- 字數提示 -->
            <div class="flex justify-between items-center px-2">
                <div class="flex items-center space-x-2 text-gray-500 font-medium text-lg">
                    <span>目前字數：</span>
                    <span id="charCount" class="font-bold text-xl text-orange-500">0</span>
                </div>
                <span id="charsNeeded" class="hidden text-orange-500 text-sm font-bold bg-orange-100 px-2 py-1 rounded-lg">再加 8 個字!</span>
            </div>

            <!-- 操作按鈕 -->
            <div class="pt-2">
                <button
                    id="actionBtn"
                    class="w-full bg-sky-400 hover:bg-sky-500 text-white font-bold text-xl md:text-2xl py-4 rounded-2xl shadow-lg hover:shadow-xl transform hover:-translate-y-1 transition-all flex items-center justify-center space-x-2 border-b-4 border-sky-600"
                >
                    <i data-lucide="sparkles" id="btnIcon" class="w-6 h-6"></i>
                    <span id="btnText">幫我檢查密碼！</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        // 初始化 Lucide Icons
        lucide.createIcons();

        // 取得 DOM 元素
        const passwordInput = document.getElementById('passwordInput');
        const togglePasswordBtn = document.getElementById('togglePasswordBtn');
        const eyeIcon = document.getElementById('eyeIcon');
        const charCountDisplay = document.getElementById('charCount');
        const charsNeededDisplay = document.getElementById('charsNeeded');
        const actionBtn = document.getElementById('actionBtn');
        const btnText = document.getElementById('btnText');
        const messageText = document.getElementById('messageText');
        const messageBubble = document.getElementById('messageBubble');
        const bubbleTailOuter = document.getElementById('bubbleTailOuter');
        const bubbleTailInner = document.getElementById('bubbleTailInner');

        // 狀態變數
        let isPasswordVisible = false;
        let currentStatus = 'idle'; // 'idle', 'error', 'success'
        const defaultMessage = "嗨！小朋友你好，我是老師的小助手。密碼設定的規則是：必須有『英文字母』加上『數字』，而且長度要至少 8 個字喔！請在下面輸入你想測試的密碼吧！";

        // 更新泡泡樣式函數
        function updateBubbleStyle(status) {
            // 移除舊有樣式
            messageBubble.classList.remove('bg-blue-50', 'border-blue-200', 'bg-rose-50', 'border-rose-300', 'bg-green-50', 'border-green-300');
            bubbleTailOuter.classList.remove('border-r-blue-200', 'border-r-rose-300', 'border-r-green-300');
            bubbleTailInner.classList.remove('border-r-blue-50', 'border-r-rose-50', 'border-r-green-50');

            // 根據狀態加上新樣式
            if (status === 'idle') {
                messageBubble.classList.add('bg-blue-50', 'border-blue-200');
                bubbleTailOuter.classList.add('border-r-blue-200');
                bubbleTailInner.classList.add('border-r-blue-50');
            } else if (status === 'error') {
                messageBubble.classList.add('bg-rose-50', 'border-rose-300');
                bubbleTailOuter.classList.add('border-r-rose-300');
                bubbleTailInner.classList.add('border-r-rose-50');
            } else if (status === 'success') {
                messageBubble.classList.add('bg-green-50', 'border-green-300');
                bubbleTailOuter.classList.add('border-r-green-300');
                bubbleTailInner.classList.add('border-r-green-50');
            }
        }

        // 更新按鈕樣式函數
        function updateButtonStyle(status) {
            actionBtn.classList.remove('bg-sky-400', 'hover:bg-sky-500', 'border-sky-600', 'bg-green-400', 'hover:bg-green-500', 'border-green-600');
            
            if (status === 'success') {
                actionBtn.classList.add('bg-green-400', 'hover:bg-green-500', 'border-green-600');
                btnText.textContent = '換一個新密碼試試';
                // 使用 Lucide 的 refresh-cw 圖示
                actionBtn.querySelector('i').setAttribute('data-lucide', 'refresh-cw');
            } else {
                actionBtn.classList.add('bg-sky-400', 'hover:bg-sky-500', 'border-sky-600');
                btnText.textContent = '幫我檢查密碼！';
                actionBtn.querySelector('i').setAttribute('data-lucide', 'sparkles');
            }
            lucide.createIcons(); // 重新渲染圖示
        }

        // 處理輸入事件 (即時字數更新)
        passwordInput.addEventListener('input', (e) => {
            const val = e.target.value;
            const len = val.length;
            
            // 更新字數顯示
            charCountDisplay.textContent = len;
            if (len >= 8) {
                charCountDisplay.classList.remove('text-orange-500');
                charCountDisplay.classList.add('text-green-500');
                charsNeededDisplay.classList.add('hidden');
            } else {
                charCountDisplay.classList.remove('text-green-500');
                charCountDisplay.classList.add('text-orange-500');
                if (len > 0) {
                    charsNeededDisplay.textContent = `再加 ${8 - len} 個字!`;
                    charsNeededDisplay.classList.remove('hidden');
                } else {
                    charsNeededDisplay.classList.add('hidden');
                }
            }

            // 如果正在修改密碼，將狀態改回預設
            if (currentStatus !== 'idle') {
                currentStatus = 'idle';
                updateBubbleStyle('idle');
                passwordInput.disabled = false;
                // 注意：這裡不主動改回預設訊息，讓小朋友能邊看剛剛的錯誤邊修改
            }
        });

        // 切換顯示/隱藏密碼
        togglePasswordBtn.addEventListener('click', () => {
            isPasswordVisible = !isPasswordVisible;
            if (isPasswordVisible) {
                passwordInput.type = 'text';
                eyeIcon.setAttribute('data-lucide', 'eye-off');
                togglePasswordBtn.title = '隱藏密碼';
            } else {
                passwordInput.type = 'password';
                eyeIcon.setAttribute('data-lucide', 'eye');
                togglePasswordBtn.title = '顯示密碼';
            }
            lucide.createIcons();
        });

        // 檢查密碼邏輯
        function checkPassword() {
            const password = passwordInput.value;

            if (!password) {
                currentStatus = 'error';
                messageText.textContent = "哎呀，你還沒有輸入密碼喔！趕快輸入看看吧！再試一次看看吧！";
                updateBubbleStyle('error');
                return;
            }

            // 檢查是否為太簡單的常見密碼
            const easyPasswords = ['12345678', '87654321', 'abcdefgh', 'password', '123456789'];
            // 檢查是否全部都是同一個字 (例如 11111111)
            const isAllSame = password.length > 0 && password.split('').every(char => char === password[0]);
            
            // 將輸入轉小寫來比對是否包含常見密碼
            const isTooSimple = easyPasswords.some(p => password.toLowerCase().includes(p)) || isAllSame;

            if (isTooSimple) {
                currentStatus = 'error';
                messageText.textContent = "哎呀！這個密碼太簡單囉（像是 12345678 或是都一樣的字），很容易被壞人猜到。請發揮創意，換一個更特別的密碼吧！再試一次看看吧！";
                updateBubbleStyle('error');
                return;
            }

            // 檢查長度、英文、數字
            const hasLength = password.length >= 8;
            const hasLetter = /[a-zA-Z]/.test(password);
            const hasNumber = /[0-9]/.test(password);

            if (hasLength && hasLetter && hasNumber) {
                // 完全符合規定
                currentStatus = 'success';
                messageText.textContent = "太棒了！這個密碼非常安全，完全符合規定喔！你好厲害！🌟";
                updateBubbleStyle('success');
                updateButtonStyle('success');
                passwordInput.disabled = true; // 鎖定輸入框
            } else {
                // 不符合規定，分類回饋
                currentStatus = 'error';
                updateBubbleStyle('error');
                
                if (!hasLength && !hasLetter && !hasNumber) {
                    messageText.textContent = "密碼太短了，而且還需要加上『英文字母』和『數字』喔！再試一次看看吧！";
                } else if (!hasLength) {
                    messageText.textContent = `密碼太短囉！現在只有 ${password.length} 個字，還需要更多字（至少要 8 個字喔）。再試一次看看吧！`;
                } else if (!hasLetter) {
                    messageText.textContent = "差一點點！你的密碼忘記加『英文字母』囉，加上英文會更安全。再試一次看看吧！";
                } else if (!hasNumber) {
                    messageText.textContent = "差一點點！密碼裡面要有『數字』才可以喔。再試一次看看吧！";
                } else {
                    messageText.textContent = "密碼還差一點點才符合規定喔！再試一次看看吧！";
                }
            }
        }

        // 重新開始
        function handleReset() {
            passwordInput.value = '';
            passwordInput.disabled = false;
            currentStatus = 'idle';
            messageText.textContent = defaultMessage;
            
            // 重置字數顯示
            charCountDisplay.textContent = '0';
            charCountDisplay.classList.remove('text-green-500');
            charCountDisplay.classList.add('text-orange-500');
            charsNeededDisplay.classList.add('hidden');

            updateBubbleStyle('idle');
            updateButtonStyle('idle');
            
            // 可選：重新設定回隱藏密碼模式
            if (isPasswordVisible) {
                togglePasswordBtn.click();
            }
            passwordInput.focus();
        }

        // 按鈕點擊事件代理
        actionBtn.addEventListener('click', () => {
            if (currentStatus === 'success') {
                handleReset();
            } else {
                checkPassword();
            }
        });

        // 允許按 Enter 鍵觸發檢查
        passwordInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                if (currentStatus === 'success') {
                    handleReset();
                } else {
                    checkPassword();
                }
            }
        });

    </script>
</body>
</html>
